<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Каталог — Germes74</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&family=Oswald:wght@600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/header.css">
  <link rel="stylesheet" href="css/nav.css">
  <link rel="stylesheet" href="css/footer.css">
  <link rel="stylesheet" href="css/catalog.css">
  <link rel="stylesheet" href="css/pages.css">
  <link rel="stylesheet" href="css/responsive.css">
</head>
<body data-page="catalog">
  <div id="appHeader"></div>

  <main class="catalog-page">
    <div class="container">
      <div class="catalog-layout">
        <aside class="sidebar">
          <button class="sidebar__toggle" id="sidebarToggle" type="button">Фильтры</button>
          <div class="sidebar__body" id="sidebarBody">
            <div class="filter-group">
              <div class="filter-group__title">Категории</div>
              <div class="filter-group__options">
                <a class="filter-tag" href="catalog.html#cat=1" data-cat="1">Литые</a>
                <a class="filter-tag" href="catalog.html#cat=2" data-cat="2">Штампованные</a>
                <a class="filter-tag" href="catalog.html#cat=3" data-cat="3">Pb</a>
                <a class="filter-tag" href="catalog.html#cat=4" data-cat="4">Zn</a>
                <a class="filter-tag" href="catalog.html" data-cat="">Все</a>
              </div>
            </div>
            <hr class="sidebar__divider">
            <div class="filter-group">
              <div class="filter-group__title">Цена, Р</div>
              <div class="price-range">
                <input class="price-range__slider" type="range" min="100" max="10000" value="10000" id="priceRange">
                <div class="price-range__labels">
                  <span>100 Р</span>
                  <span id="priceVal">10 000 Р</span>
                  <span>10 000 Р</span>
                </div>
              </div>
            </div>
            <hr class="sidebar__divider">
            <div class="sidebar__actions">
              <button class="btn-filter btn-filter--apply" type="button">Показать товары</button>
              <button class="btn-filter btn-filter--reset" id="resetFilters" type="button">Сбросить всё</button>
            </div>
          </div>
        </aside>

        <section>
          <div class="catalog-header">
            <h1 class="catalog-header__title">Каталог</h1>
            <span class="catalog-header__count" id="catalogCount">0 товаров</span>
          </div>
          <div class="category-chips" id="categoryChips"></div>
          <div class="catalog-grid" id="catalogGrid"></div>
          <nav class="pagination" aria-label="Пагинация"></nav>
        </section>
      </div>
    </div>
  </main>

  <div id="appFooter"></div>
  <script src="js/data.js"></script>
  <script src="js/core.js"></script>
  <script src="js/pages.js"></script>
</body>
</html>
