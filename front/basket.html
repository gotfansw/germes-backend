<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Корзина — Germes74</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&family=Oswald:wght@600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/header.css">
  <link rel="stylesheet" href="css/nav.css">
  <link rel="stylesheet" href="css/footer.css">
  <link rel="stylesheet" href="css/pages.css">
  <link rel="stylesheet" href="css/responsive.css">
</head>
<body data-page="cart">
  <div id="appHeader"></div>

  <main class="page">
    <div class="container">
      <div class="cart-top">
        <div class="crumbs">
          <a href="index.html">Главная</a>
          <span> / </span>
          <span>Моя корзина</span>
        </div>
        <button class="btn cart-clear" type="button" id="clearCartTop">Очистить корзину</button>
      </div>

      <section class="cart-page">
        <div id="cartEmpty" class="card cart-empty" style="display:none;">Корзина пуста.</div>
        <div id="cartList" class="cart-list"></div>
        <div class="card cart-summary">
          <div class="cart-sum__row"><span>Товаров</span><b id="sumItems">0 шт.</b></div>
          <div class="cart-sum__row"><span>Сумма</span><b id="sumSubtotal">0 ₽</b></div>
          <div class="cart-sum__row"><span>Доставка</span><b id="sumDelivery">0 ₽</b></div>
          <div class="cart-sum__row cart-sum__total"><span>Итого</span><b id="sumTotal">0 ₽</b></div>
        </div>
        
        <div class="cart-actions">
          <button class="btn btn-primary cart-pay" type="button" id="payBtn">Оформить заказ</button>
          <div class="cart-note" id="cartNote" style="display:none;">Заказ создан. Менеджер свяжется с вами.</div>
        </div>

       <div class="sbp-modal" id="sbpModal" aria-hidden="true">
  <div class="sbp-modal__backdrop sbpClose"></div>
  <div class="sbp-modal__dialog">
    <button class="sbp-modal__close sbpClose" type="button">×</button>
    
    <div class="sbp-modal__header">
      <div class="sbp-modal__icon">💳</div>
      <div class="sbp-modal__title">Оформление заказа</div>
      <div class="sbp-modal__subtitle">Оплата через СБП</div>
    </div>

    <div class="sbp-modal__body">
      <div class="sbp-modal__field">
        <label class="sbp-modal__label">E-mail для уведомления</label>
        <input class="sbp-modal__input" type="email" id="customerEmail" placeholder="your@email.com">
      </div>

      <div class="sbp-modal__field">
        <label class="sbp-modal__label">Телефон</label>
        <input class="sbp-modal__input" id="customerPhone" type="tel" placeholder="+7 (___) ___-__-__">
      </div>

      <div class="sbp-modal__field">
        <label class="sbp-modal__label">Способ доставки</label>
        <select class="sbp-modal__input sbp-modal__select" id="deliverySelect">
          <option value="">— выберите —</option>
          <option value="pickup">Самовывоз</option>
          <option value="cdek">СДЭК</option>
          <option value="yandex">Яндекс Доставка</option>
          <option value="avito">Авито Доставка</option>
          <option value="post">Почта России</option>
        </select>
      </div>

      <div class="sbp-modal__field">
        <label class="sbp-modal__label">Адрес доставки</label>
        <input class="sbp-modal__input" id="deliveryAddress" type="text" placeholder="Город, улица, дом, квартира">
      </div>

      <button class="btn btn-primary sbp-pay-btn" type="button" id="createOrderBtn">
        Показать QR для оплаты
      </button>

      <div class="sbp-status" id="sbpStatus" style="display:none;"></div>

      <div class="sbp-qr" id="sbpQrWrap" style="display:none;">
        <a id="sbpQrLink" href="#" target="_blank">
          <img id="sbpQrImage" src="" alt="QR СБП" style="max-width:220px; border-radius:12px;">
        </a>
        <p class="sbp-qr__hint">Отсканируйте QR камерой телефона</p>
      </div>

      <div class="sbp-meta" id="sbpMeta" style="display:none;">
        <div class="sbp-meta__row"><span>Номер квитанции</span><b id="sbpReceipt">—</b></div>
        <div class="sbp-meta__row"><span>Трек-номер</span><b id="sbpTrack">—</b></div>
      </div>

      <div class="sbp-timer" id="sbpTimer" style="display:none;">
        ⏱ Время на оплату: <b id="sbpTimerVal">10:00</b>
      </div>

      <div class="cart-note" id="cartNote" style="display:none;">
        ✓ Заказ создан. Менеджер свяжется с вами.
      </div>
    </div>
  </div>
</div>

      </section>
    </div>
  </main>

  <div id="appFooter"></div>
  <script src="js/data.js"></script>
  <script src="js/core.js"></script>
  <script src="js/pages.js"></script>
</body>
</html>
