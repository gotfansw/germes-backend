<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Каталог — Germes74</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&family=Oswald:wght@600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/header.css">
  <link rel="stylesheet" href="css/nav.css">
  <link rel="stylesheet" href="css/footer.css">
  <link rel="stylesheet" href="css/catalog.css">
  <link rel="stylesheet" href="css/pages.css">
  <link rel="stylesheet" href="css/responsive.css">
</head>
<body data-page="catalog">
  <div id="appHeader"></div>
  <main class="catalog-page">
    <div class="container">
      <div class="catalog-layout">
        <aside class="sidebar">
          <button class="sidebar__toggle" id="sidebarToggle" type="button">Фильтры</button>
          <div class="sidebar__body" id="sidebarBody">

            <!-- Тип крепления -->
            <div class="filter-group">
              <div class="filter-group__title">Тип крепления</div>
              <div class="filter-group__options">
                <button class="filter-tag" type="button" data-type="nabivnye">Набивные</button>
                <button class="filter-tag" type="button" data-type="samokley">Самоклейка</button>
                <button class="filter-tag filter-tag--active" type="button" data-type="">Все</button>
              </div>
            </div>
            <hr class="sidebar__divider">

            <!-- Материал -->
            <div class="filter-group">
              <div class="filter-group__title">Материал</div>
              <div class="filter-group__options">
                <button class="filter-tag" type="button" data-variant="litie">Литые</button>
                <button class="filter-tag" type="button" data-variant="shtamp">Штамп.</button>
                <button class="filter-tag" type="button" data-material="pb">Pb</button>
                <button class="filter-tag" type="button" data-material="fe">Fe</button>
              </div>
            </div>
            <hr class="sidebar__divider">

            <!-- Новые категории -->
            <div class="filter-group">
              <div class="filter-group__title">Категория</div>
              <div class="filter-group__options filter-group__options--column">
                <button class="filter-tag filter-tag--category" type="button" data-category-id="5">
                  Груза на литые диски (алюм.)
                </button>
                <button class="filter-tag filter-tag--category" type="button" data-category-id="6">
                  Груза на штампованные диски
                </button>
                <button class="filter-tag filter-tag--category" type="button" data-category-id="7">
                  Самоклеящиеся свинцовые груза
                </button>
                <button class="filter-tag filter-tag--category" type="button" data-category-id="8">
                  Самоклеящиеся груза Zn
                </button>
                <button class="filter-tag filter-tag--category filter-tag--active" type="button" data-category-id="">
                  Все категории
                </button>
              </div>
            </div>
            <hr class="sidebar__divider">

            <!-- Вес упаковки -->
            <div class="filter-group">
              <div class="filter-group__title">Вес упаковки</div>
              <div class="filter-group__options" id="weightFilters"></div>
            </div>
            <hr class="sidebar__divider">

            <!-- Цена -->
            <div class="filter-group">
              <div class="filter-group__title">Цена, Р</div>
              <div class="price-range">
                <input class="price-range__slider" type="range" min="100" max="10000" value="10000" id="priceRange">
                <div class="price-range__labels">
                  <span>100 Р</span>
                  <span id="priceVal">10 000 Р</span>
                  <span>10 000 Р</span>
                </div>
              </div>
            </div>
            <hr class="sidebar__divider">

            <div class="sidebar__actions">
              <button class="btn-filter btn-filter--apply" type="button">Показать товары</button>
              <button class="btn-filter btn-filter--reset" id="resetFilters" type="button">Сбросить всё</button>
            </div>
          </div>
        </aside>

        <section>
          <div class="catalog-header">
            <h1 class="catalog-header__title">Каталог</h1>
            <span class="catalog-header__count" id="catalogCount">0 товаров</span>
          </div>
          <div class="catalog-grid" id="catalogGrid"></div>
          <nav class="pagination" aria-label="Пагинация"></nav>
        </section>
      </div>
    </div>
  </main>
  <div id="appFooter"></div>
  <script src="js/data.js"></script>
  <script src="js/core.js"></script>
  <script src="js/pages.js"></script>

  <!-- Логика фильтрации по новым категориям -->
  <script>
    document.addEventListener("DOMContentLoaded", () => {
      const categoryBtns = document.querySelectorAll(".filter-tag--category");
      let activeCategoryId = "";

      categoryBtns.forEach(btn => {
        btn.addEventListener("click", () => {
          // Снять активный со всех кнопок категорий
          categoryBtns.forEach(b => b.classList.remove("filter-tag--active"));
          btn.classList.add("filter-tag--active");
          activeCategoryId = btn.dataset.categoryId || "";

          // Если есть глобальный фильтр — применить
          if (typeof window.applyFilters === "function") {
            window.applyFilters({ categoryId: activeCategoryId });
          }
        });
      });

      // Сброс категории при сбросе всех фильтров
      document.getElementById("resetFilters")?.addEventListener("click", () => {
        activeCategoryId = "";
        categoryBtns.forEach(b => b.classList.remove("filter-tag--active"));
        const allBtn = document.querySelector('.filter-tag--category[data-category-id=""]');
        allBtn?.classList.add("filter-tag--active");
      }, true); // capture=true чтобы сработать раньше pages.js
    });
  </script>
</body>
</html>
